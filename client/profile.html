<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Go-Explore</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url("assets/images/login-bg.jpg") center center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile {
            width: 460px;
            background: rgba(255, 255, 255, .95);
            -webkit-backdrop-filter: blur(18px);
            backdrop-filter: blur(18px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .25);
        }

        .profile h2 {
            text-align: center;
            font-size: 32px;
            color: #118B2F;
            margin-bottom: 30px;
        }

        .profile label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .profile input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid #dcdcdc;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: .3s;
            background: #fff;
            color: #333;
        }

        .profile input:focus {
            border-color: #118B2F;
            box-shadow: 0 0 8px rgba(17, 139, 47, .25);
        }

        .profile input[readonly] {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .profile button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            background: #118B2F;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        .profile button:hover {
            background: #0d6f24;
            transform: translateY(-2px);
        }

        .profile a {
            text-decoration: none;
        }

        @media(max-width:500px) {

            .profile {
                width: 100%;
                padding: 25px;
            }

            .profile h2 {
                font-size: 26px;
            }

        }
    </style>
</head>

<body>

    <div class="profile">
        <h2>
            👤 My Profile
        </h2>

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" readonly>

        <label for="phone">Phone</label>
        <input type="text" id="phone" placeholder="Enter your phone number">
        <label for="role">Role</label>
        <input type="text" id="role" placeholder="Your role" readonly>

        <button onclick="updateProfile()">💾 Save Changes</button>

        <a href="my-bookings.html">
            <button type="button">📖 My Bookings</button>
        </a>

        <a href="wishlist.html">
            <button type="button">❤️ My Wishlist</button>
        </a>

        <button onclick="logout()">🚪 Logout</button>
    </div>

    <script src="assets/js/auth.js"></script>

    <script>
        checkAuth();

        const user = getUser();

        document.getElementById("name").value = user.name;
        document.getElementById("email").value = user.email;
        document.getElementById("phone").value = user.phone || "";
        document.getElementById("role").value = user.role;

        async function updateProfile() {
            const token = localStorage.getItem("token");

            const res = await fetch("http://localhost:5000/api/users/profile", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    phone: document.getElementById("phone").value
                })
            });

            const data = await res.json();

            if (data.success) {
                localStorage.setItem("user", JSON.stringify(data.user));
                alert("Profile updated successfully!");
            } else {
                alert(data.message);
            }
        }
    </script>

</body>

</html>
