<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bookings | Go-Explore</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
            margin: 30px 0;
        }

        #bookingContainer {
            width: 90%;
            margin: auto;
            display: grid;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,.15);
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }

        .approve {
            background: green;
            color: white;
        }

        .cancel {
            background: red;
            color: white;
        }
    </style>

</head>

<body>

<h1>📋 All Bookings (Admin)</h1>

<div id="bookingContainer"></div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/admin-bookings.js"></script>

</body>

</html>
