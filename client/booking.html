<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Trip | Go-Explore</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="profile">

    <h2>Book Your Trip</h2>

    <form id="bookingForm">

        <label for="place">Place Name</label>
        <input type="text" id="place" placeholder="Place Name" readonly>

        <br><br>

        <label for="date">Travel Date</label>
        <input type="date" id="date" required>

        <br><br>

        <label for="persons">Number of Persons</label>
        <input type="number" id="persons" placeholder="Number of Persons" min="1" required>

        <br><br>

        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="Phone Number" required>

        <br><br>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email" required>

        <br><br>

        <button type="submit" class="btn register-btn">Pay & Book Now</button>

    </form>

</div>

<script src="assets/js/auth.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="assets/js/booking.js"></script>
</body>
</html>
