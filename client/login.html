<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Go-Explore</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:url("assets/images/login-bg.jpg") center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.login-container{
width:420px;
background:rgba(255,255,255,.95);
	-webkit-backdrop-filter:blur(18px);
	backdrop-filter:blur(18px);
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.login-container h2{
text-align:center;
margin-bottom:30px;
font-size:32px;
font-weight:700;
color:#118b2f;
}

.input-box{
position:relative;
margin-bottom:22px;
}

.input-box input{
width:100%;
padding:15px 50px 15px 15px;
font-size:16px;
border:1px solid #d1d5db;
border-radius:10px;
background:#fff;
color:#222;
}

.input-box input::placeholder{
color:#666;
}

.input-box i{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
color:#555;
font-size:18px;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
font-size:14px;
color:#333;
}

.options label{
display:flex;
align-items:center;
gap:8px;
color:#333;
font-weight:500;
}

.options input{
width:18px;
height:18px;
}

.options a{
color:#118b2f;
text-decoration:none;
font-weight:500;
}

.options a:hover{
text-decoration:underline;
}

.login-btn{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#118b2f;
color:#fff;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
background:#118b2f;
}

.social-login{
display:flex;
justify-content:center;
gap:18px;
margin-top:25px;
}

.social-login a{
width:45px;
height:45px;
border-radius:50%;
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
color:#444;
transition:.3s;
}

.social-login a:hover{
background:#118b2f;
color:#fff;
transform:translateY(-4px);
}

.register-link{
margin-top:25px;
text-align:center;
font-size:15px;
color:#333;
}

.register-link a{
color:#118b2f;
font-weight:600;
text-decoration:none;
}

.register-link a:hover{
text-decoration:underline;
}

.back-home{
display:block;
margin-top:18px;
text-align:center;
text-decoration:none;
font-weight:600;
color:#118b2f;
}

.back-home:hover{
text-decoration:underline;
}
</style>

</head>

<body>

<div class="login-container">

<h2>
<i class="fa-solid fa-mountain-sun"></i> Go-Explore Tourism
</h2>

<form id="loginForm">

<div class="input-box">
<input type="email" id="email" placeholder="Email Address" required>
<i class="fa-solid fa-envelope"></i>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Password" required>
<i class="fa-solid fa-lock"></i>
</div>

<div class="options">
<label for="remember">
<input type="checkbox" id="remember">
Remember Me
</label>
<a href="#">Forgot Password?</a>
</div>

<button type="submit" class="login-btn">
Login
</button>

</form>

<div class="social-login">
<a href="#" title="Google Login"><i class="fab fa-google"></i></a>
<a href="#" title="Facebook Login"><i class="fab fa-facebook-f"></i></a>
<a href="#" title="GitHub Login"><i class="fab fa-github"></i></a>
</div>

<div class="register-link">
Don't have an account?
<a href="register.html">Register</a>
</div>

<a href="index.html" class="back-home">
← Back to Home
</a>

</div>

<script src="assets/js/login.js"></script>
<script src="assets/js/places-data.js"></script>
<script src="assets/js/search.js"></script>

</body>
</html>
